<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนรับบริการ Line Care Center</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f0f4f8; }
        .container { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 400px; margin: 0 auto; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 14px; }
        input[type="text"], input[type="tel"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; transition: border-color 0.3s; }
        input[type="text"]:focus, input[type="tel"]:focus { border-color: #00B900; outline: none; }
        button { width: 100%; padding: 14px; background-color: #00B900; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.3s; margin-top: 10px; }
        button:hover { background-color: #009900; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        /* ซ่อนช่อง UID ไว้ ไม่ให้ลูกค้าเห็น */
        #userId { display: none; } 
    </style>
</head>
<body>

<div class="container">
    <h2>ลงทะเบียนผู้ใช้งาน</h2>
    <form id="registerForm">
        <input type="text" id="userId" name="userId" readonly>

        <div class="form-group">
            <label for="firstName">ชื่อ</label>
            <input type="text" id="firstName" name="firstName" required placeholder="สมชาย">
        </div>
        <div class="form-group">
            <label for="lastName">นามสกุล</label>
            <input type="text" id="lastName" name="lastName" required placeholder="ใจดี">
        </div>
        <div class="form-group">
            <label for="phone">เบอร์โทรศัพท์</label>
            <input type="tel" id="phone" name="phone" required placeholder="0812345678">
        </div>
        <div class="form-group">
            <label for="hn">รหัสประจำตัวผู้ป่วย (HN) *ถ้าทราบ</label>
            <input type="text" id="hn" name="hn" placeholder="เช่น 6612345">
        </div>

        <button type="submit" id="submitBtn">ยืนยันข้อมูล</button>
    </form>
</div>

<script>
    // 1. นำ LIFF ID ของคุณมาใส่ตรงนี้
    const LIFF_ID = "2009818553-r7kyrx5T"; 
    
    // 2. Webhook URL ของ n8n (ต้องเป็นโหนด Webhook ตัวใหม่ที่ตั้งค่ารับ POST)
    const N8N_WEBHOOK_URL = "https://idd-chavalit.taild791ea.ts.net/webhook-test/lineticket";

    async function initializeLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (liff.isLoggedIn()) {
                getProfileData();
            } else {
                liff.login(); 
            }
        } catch (err) {
            console.error('LIFF Initialization failed', err);
            alert('เกิดข้อผิดพลาดในการเชื่อมต่อระบบ LINE');
        }
    }

    async function getProfileData() {
        try {
            const profile = await liff.getProfile();
            document.getElementById('userId').value = profile.userId;
        } catch (err) {
            console.error('Error getting profile', err);
        }
    }

    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault(); 
        
        const lineUid = document.getElementById('userId').value;
        
        if (!lineUid) {
            alert("ไม่พบข้อมูล LINE ID กรุณาเปิดผ่านแอปพลิเคชัน LINE");
            return;
        }

        // นำชื่อและนามสกุลมารวมกันเพื่อให้ตรงกับคอลัมน์ full_name ใน Google Sheets
        const fullName = document.getElementById('firstName').value.trim() + " " + document.getElementById('lastName').value.trim();

        // รวบรวมข้อมูล จัดโครงสร้างให้ตรงกับคอลัมน์ใน Google Sheets
        const formData = {
            line_uid: lineUid,
            full_name: fullName,
            phone: document.getElementById('phone').value,
            hn: document.getElementById('hn').value || "-", // ถ้าไม่ใส่ HN ให้ส่งขีดกลางไปแทน
            is_registered: "TRUE",
            current_state: "IDLE"
        };

        const btn = document.getElementById('submitBtn');
        btn.innerText = "กำลังบันทึกข้อมูล...";
        btn.disabled = true;

        fetch(N8N_WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        })
        .then(response => {
            if(response.ok) {
                alert("ลงทะเบียนสำเร็จ ขอบคุณครับ!");
                liff.closeWindow(); 
            } else {
                throw new Error('Network response was not ok');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert("ไม่สามารถติดต่อเซิร์ฟเวอร์ได้ กรุณาลองใหม่อีกครั้ง");
            btn.innerText = "ยืนยันข้อมูล";
            btn.disabled = false;
        });
    });

    initializeLiff();
</script>

</body>
</html>
